spring:
  application:
    name: feather_rag
  ai:
    dashscope:
      api-key: sk-1441e7cd83c0411290f22624175a1d78
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 768
    vectorstore:
      pgvector:
        # 向量索引类型
        index-type: HNSW
        # 距离度量，余弦值
        distance-type: COSINE_DISTANCE
        # 向量维度
        dimensions: 768
        # 批量处理大小
        max-document-batch-size: 9
        # 启动时是否自动创建表（设为false，避免启动时连接失败）
        initialize-schema: false
        # 创建的表名
        table-name: vector_st
  datasource:
    url: jdbc:postgresql://localhost:5433/rag_test #
    username: pgvector
    password: pgvector
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j666
    # 连接失败不阻止启动
    connection-timeout: 5s
    # 启动时不验证连接
    verify-connection: false
  elasticsearch:
    uris: http://localhost:9200
minio:
  url: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: rag-test
  endpoint: http://localhost:9000
server:
  port: 8001