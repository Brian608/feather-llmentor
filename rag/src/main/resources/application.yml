spring:
  application:
    name: feather_rag
  ai:
    dashscope:
      api-key: sk-1441e7cd83c0411290f22624175a1d78
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 768
    vectorstore:
      pgvector:
        # 向量索引类型
        index-type: HNSW
        # 距离度量，余弦值
        distance-type: COSINE_DISTANCE
        # 向量维度
        dimensions: 768
        # 批量处理大小
        max-document-batch-size: 9
        # 启动时是否自动创建表（设为false，避免启动时连接失败）
        initialize-schema: false
        # 创建的表名
        table-name: vector_st
  datasource:
    url: jdbc:postgresql://localhost:5433/rag_test #
    username: pgvector
    password: pgvector
  elasticsearch:
    uris: http://localhost:9200

server:
  port: 8001