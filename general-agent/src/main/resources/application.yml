server:
  port: 8008
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
spring:
  main:
    web-application-type: reactive
  ai:
    openai:
      api-key: sk-1441e7cd83c0411290f22624175a1d78
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          maxTokens: 5000
  datasource:
    url: jdbc:mysql://localhost:3306/spring-ai?useUnicode=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1  # 禁用连接池初始化超时检查，允许启动时无数据库连接
  sql:
    init:
      continue-on-error: true  # SQL初始化失败时继续启动

logging:
  level:
    org:
      springframework:
        ai: DEBUG
